name: App CI/CD to ECS (Deploy from ECR)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: 957948932374
  ECR_REPO: raghu-node-app
  ECS_CLUSTER: raghu-cluster
  ECS_SERVICE: raghu-service

jobs:

  deploy:
    runs-on: [self-hosted, rama]

    steps:

      # =========================
      # 1. Checkout code (optional for metadata)
      # =========================
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # 2. Configure AWS (IMPORTANT FIX)
      # =========================
      - name: Configure AWS Credentials
        run: |
          export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          export AWS_REGION=$AWS_REGION
          aws sts get-caller-identity

      # =========================
      # 3. Login to ECR
      # =========================
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      # =========================
      # 4. Pull latest image from ECR
      # =========================
      - name: Pull Image
        run: |
          docker pull $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:latest

      # =========================
      # 5. Stop old container (if running locally on runner)
      # =========================
      - name: Stop old container
        run: |
          docker stop app || true
          docker rm app || true

      # =========================
      # 6. Run new container (test on runner)
      # =========================
      - name: Run Container (Validation step)
        run: |
          docker run -d --name app -p 3000:3000 \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:latest

      # =========================
      # 7. Deploy to ECS (REAL DEPLOY)
      # =========================
      - name: Force ECS Deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      # =========================
      # 8. Success
      # =========================
      - name: Done
        run: echo "🚀 App deployed successfully to ECS"
