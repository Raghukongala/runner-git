name: Test Self Hosted Runner

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: [self-hosted, rama]   # 👈 IMPORTANT (match your label)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner Test
        run: |
          echo "🔥 Runner is working"
          uname -a
          whoami

      - name: File Test
        run: |
          echo "Hello Raghu DevOps" > test.txt
          cat test.txt

      - name: List Files
        run: |
          ls -ltr
