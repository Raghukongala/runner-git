name: DevOps Docker Pipeline

on:
  push:
    branches:
      - main

jobs:
  # 🔹 JOB 1: Build Docker Image
  build:
    runs-on: [self-hosted, rama]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: System Info
        run: |
          uname -a
          whoami
          docker --version

      - name: Build Docker Image
        run: |
          docker build -t raghu-node-app .

  # 🔹 JOB 2: Run & Test Container
  test:
    needs: build
    runs-on: [self-hosted, rama]

    steps:
      - name: Rebuild Image (needed for new job)
        run: |
          docker build -t raghu-node-app .

      - name: Run Container
        run: |
          docker run -d -p 3000:3000 --name test-container raghu-node-app
          sleep 5

      - name: Test Application
        run: |
          curl http://localhost:3000

      - name: Stop Container
        run: |
          docker stop test-container || true
          docker rm test-container || true

  # 🔹 JOB 3: Deploy (with approval ready)
  deploy:
    needs: test
    runs-on: [self-hosted, rama]

    environment:
      name: production   # 👈 enables manual approval

    steps:
      - name: Deploy Step
        run: |
          echo "🚀 Deploying application..."
          echo "This is where ECS deployment will happen"
