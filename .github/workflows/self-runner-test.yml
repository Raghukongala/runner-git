name: Docker CI/CD to ECR

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: [self-hosted, rama]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t raghu-node-app .

      - name: Login to ECR (IAM Role)
        run: |
          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin \
          957948932374.dkr.ecr.ap-south-1.amazonaws.com

      - name: Tag Image
        run: |
          docker tag raghu-node-app:latest \
          957948932374.dkr.ecr.ap-south-1.amazonaws.com/raghu-node-app:latest

      - name: Push to ECR
        run: |
          docker push 957948932374.dkr.ecr.ap-south-1.amazonaws.com/raghu-node-app:latest
