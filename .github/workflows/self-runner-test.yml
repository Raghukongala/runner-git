name: DevOps App Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: [self-hosted, rama]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔍 System Info
      - name: System Info
        run: |
          uname -a
          whoami

      # 🔧 Install Node.js
      - name: Install Node
        run: |
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt install -y nodejs

      # 📦 Install dependencies
      - name: Install Dependencies
        run: |
          npm install

      # ▶️ Run app (background)
      - name: Start App
        run: |
          node app.js &
          sleep 5

      # 🌐 Test app locally
      - name: Test App
        run: |
          curl http://localhost:3000

      # 📦 Package app
      - name: Create Artifact
        run: |
          tar -czf app-build.tar.gz .

      # 📤 Upload artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: app-build.tar.gz
