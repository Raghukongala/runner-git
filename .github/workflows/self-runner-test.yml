name: DevOps Docker Pipeline (Multi Job)

on:
  push:
    branches:
      - main

jobs:
  # 🔹 JOB 1: Build
  build:
    runs-on: [self-hosted, rama]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Docker
        run: |
          sudo apt update
          sudo apt install -y docker.io
          sudo systemctl start docker

      - name: Build Docker Image
        run: |
          docker build -t raghu-node-app .

  # 🔹 JOB 2: Test (runs AFTER build)
  test:
    needs: build   # 👈 dependency
    runs-on: [self-hosted, rama]

    steps:
      - name: Run Container
        run: |
          docker run -d -p 3000:3000 --name test-container raghu-node-app
          sleep 5

      - name: Test App
        run: |
          curl http://localhost:3000

      - name: Stop Container
        run: |
          docker stop test-container || true
          docker rm test-container || true

  # 🔹 JOB 3: Deploy (optional)
  deploy:
    needs: test   # 👈 runs after test
    runs-on: [self-hosted, rama]

    steps:
      - name: Deploy Step
        run: |
          echo "🚀 Deploying application..."
