name: DevOps App Pipeline (Fixed)

on:
  push:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: [self-hosted, rama]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔍 System Info
      - name: System Info
        run: |
          echo "===== SYSTEM INFO ====="
          uname -a
          whoami
          echo "Arch: $(uname -m)"

      # 🔧 Install Node.js
      - name: Install Node
        run: |
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt install -y nodejs

      # 📦 Install dependencies
      - name: Install Dependencies
        run: |
          npm install

      # ▶️ Start App (background)
      - name: Start App
        run: |
          node app.js > app.log 2>&1 &
          echo "App started..."
          sleep 5

      # 🌐 Test app
      - name: Test App
        run: |
          curl http://localhost:3000

      # 🛑 Stop app (VERY IMPORTANT FIX)
      - name: Stop App
        run: |
          pkill -f "node app.js" || true

      # 📦 Prepare clean build (NO runtime files)
      - name: Prepare Build
        run: |
          mkdir build
          cp app.js package.json build/
          echo "Build prepared"

      # 📦 Create artifact (FIXED)
      - name: Create Artifact
        run: |
          tar -czf app-build.tar.gz build/

      # 📤 Upload artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: app-build.tar.gz

      # ✅ Final status
      - name: Pipeline Status
        run: |
          echo "✅ Pipeline completed successfully"
