name: DevOps Docker CI/CD to ECR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: [self-hosted, rama]

    env:
      AWS_REGION: ap-south-1
      AWS_ACCOUNT_ID: 957948932374
      ECR_REPO: raghu-node-app

    steps:
      # =========================
      # 1. Checkout Code
      # =========================
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # 2. Ensure ECR Repository Exists
      # =========================
      - name: Create ECR Repo if not exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPO --region $AWS_REGION || \
          aws ecr create-repository --repository-name $ECR_REPO --region $AWS_REGION

      # =========================
      # 3. Build Docker Image
      # =========================
      - name: Build Docker Image
        run: |
          docker build -t $ECR_REPO .

      # =========================
      # 4. Login to AWS ECR
      # =========================
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      # =========================
      # 5. Tag Image
      # =========================
      - name: Tag Docker Image
        run: |
          docker tag $ECR_REPO:latest \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:latest

      # =========================
      # 6. Push Image to ECR
      # =========================
      - name: Push to ECR
        run: |
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:latest

      # =========================
      # 7. Success Message
      # =========================
      - name: Done
        run: echo "🚀 Docker image successfully pushed to ECR"
